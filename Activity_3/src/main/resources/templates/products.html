<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="webjars/bootstrap/5.3.8/css/bootstrap.min.css">
</head>
<body>
    <h2>Test Products</h2>
   <div class="p-3">
       <table class="table">
           <thead>
           <tr>
               <th>ID</th><th>Name</th><th>Price</th><th>Quantity</th>
           </tr>
           </thead>
           <tbody>
           <tr th:each="p:${listproducts}">
           <td th:text="${p.id}"></td>
           <td th:text="${p.name}"></td>
           <td th:text="${p.price}"></td>
           <td th:text="${p.quantity}"></td>
               <td>
                   <a onclick="return confirm('Etes vous sur !')" class="btn btn-danger" th:href="@{/deletProduct(id=${p.id})}">Delete</a>
               </td>
           </tr>
           </tbody>
       </table>
   </div>
</body>
</html>
